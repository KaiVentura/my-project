<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Google Form</title>
  <style>

    :root {
      --primary: #0f172a;       
      --accent: #3b82f6;      
      --accent-hover: #2563eb;
      --light: #f8fafc;        
      --dark: #1e293b;         
      --border: #e2e8f0;
      --radius: 12px;
      --success: #10b981; 
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--light);
      color: var(--dark);
      line-height: 1.6;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }


    form {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
      display: flex;
      flex-direction: column;
      gap: 15px;
      position: relative;
    }

    label {
      display: block;
      font-weight: bold;
      color: var(--primary);
    }


    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      background-color: #fff;
      color: var(--dark);
      font-size: 0.95rem;
    }
    
    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }


    fieldset {
      margin-top: 10px;
      padding: 15px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    legend {
      font-weight: bold;
      color: var(--primary);
      padding: 0 10px;
    }

    fieldset label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: normal;
      color: var(--dark);
    }

    fieldset input[type="radio"] {
      width: auto;
      cursor: pointer;
    }

 
    button {
      margin-top: 10px;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: var(--accent-hover);
    }
    
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    button:active {
      transform: scale(0.98);
    }

    
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ffffff;
      color: var(--dark);
      padding: 16px 24px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      border-left: 4px solid var(--success);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2000;
      font-weight: 500;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast-icon {
      background: #ecfdf5;
      color: var(--success);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div id="successToast" class="toast">
  <div class="toast-icon">✓</div>
  <div>Form submitted successfully!</div>
</div>

<form id="googleForm">
  <div>
    <label for="name">Name</label>
    <input type="text" name="name" id="name" required>
  </div>

  <div>
    <label for="gender">Gender</label>
    <select name="gender" id="gender">
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Other">Other</option>
    </select>
  </div>

  <fieldset>
    <legend>Age Group</legend>
    <label><input type="radio" name="ageGroup" value="Under 18"> Under 18</label>
    <label><input type="radio" name="ageGroup" value="18-30"> 18-30</label>
    <label><input type="radio" name="ageGroup" value="31-50"> 31-50</label>
    <label><input type="radio" name="ageGroup" value="51+"> 51+</label>
  </fieldset>

  <div>
    <label for="comments">Comments</label>
    <textarea name="comments" id="comments" rows="4"></textarea>
  </div>

  <button type="submit" id="submitBtn">Submit</button>
</form>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxdJXUC3ONKsspthL3CtHt1HyVbQRM3M-Ta_DA-72NgZOG4UnAVWf7pzUlda8wNVWD2/exec';
  const form = document.getElementById('googleForm');
  const submitBtn = document.getElementById('submitBtn');
  const toast = document.getElementById('successToast');

  form.addEventListener('submit', e => {
    e.preventDefault(); 
    
    // UI Improvement: Disable button during submission to prevent double clicks
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        // UI Action: Slide toast notification in
        toast.classList.add('show');
        form.reset();
        
        // UI Action: Hide toast smoothly after 4 seconds
        setTimeout(() => {
          toast.classList.remove('show');
        }, 4000);
      })
      .catch(error => alert('Error!', error.message))
      .finally(() => {
        // UI Action: Reset button state
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
      });
  });
</script>

</body>
</html>
